name: Deploy Extras

on:
  workflow_dispatch:

jobs:
  deploy-extras:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.RASPBERRY_PI_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat <<EOF > ~/.ssh/config
          Host ${{ secrets.CLOUDFLARE_TUNNEL_DOMAIN }}
            User ${{ secrets.RASPBERRY_PI_USERNAME }}
            IdentityFile ~/.ssh/id_ed25519
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            ServerAliveInterval 30
            ServerAliveCountMax 5
          EOF
          chmod 600 ~/.ssh/config
        shell: bash

      - name: Copy deployment scripts to Pi
        run: |
          ssh ${{ secrets.CLOUDFLARE_TUNNEL_DOMAIN }} "mkdir -p ~/deployment-scripts/litellm"
          scp deployment-scripts/*.sh ${{ secrets.CLOUDFLARE_TUNNEL_DOMAIN }}:~/deployment-scripts/
          scp deployment-scripts/litellm/config.yaml ${{ secrets.CLOUDFLARE_TUNNEL_DOMAIN }}:~/deployment-scripts/litellm/
          ssh ${{ secrets.CLOUDFLARE_TUNNEL_DOMAIN }} "chmod +x ~/deployment-scripts/*.sh"
        shell: bash

      - name: Write deploy env file on Pi
        run: |
          cat > /tmp/deploy.env << 'EOF'
          export OPEN_ROUTER_KEY='${{ secrets.OPEN_ROUTER_KEY }}'
          export HERMES_API_KEY='${{ secrets.HERMES_API_KEY }}'
          export MCP_API_KEY='${{ secrets.MCP_API_KEY }}'
          export ACTUAL_HTTP_API_KEY='${{ secrets.ACTUAL_HTTP_API_KEY }}'
          export ACTUAL_SERVER_PASSWORD='${{ secrets.ACTUAL_SERVER_PASSWORD }}'
          export VIKUNJA_DB_NAME='${{ secrets.VIKUNJA_DB_NAME }}'
          export VIKUNJA_DB_USER='${{ secrets.VIKUNJA_DB_USER }}'
          export VIKUNJA_DB_PASSWORD='${{ secrets.VIKUNJA_DB_PASSWORD }}'
          export VIKUNJA_DB_ROOT_PASSWORD='${{ secrets.VIKUNJA_DB_ROOT_PASSWORD }}'
          export VIKUNJA_SERVICE_PUBLICURL='${{ secrets.VIKUNJA_SERVICE_PUBLICURL }}'
          export LITELLM_MASTER_KEY='${{ secrets.LITELLM_MASTER_KEY }}'
          export LANGFUSE_PUBLIC_KEY='${{ secrets.LANGFUSE_PUBLIC_KEY }}'
          export LANGFUSE_SECRET_KEY='${{ secrets.LANGFUSE_SECRET_KEY }}'
          export LANGFUSE_HOST='${{ secrets.LANGFUSE_HOST }}'
          EOF
          chmod 600 /tmp/deploy.env
          scp /tmp/deploy.env ${{ secrets.CLOUDFLARE_TUNNEL_DOMAIN }}:/tmp/deploy.env
          ssh ${{ secrets.CLOUDFLARE_TUNNEL_DOMAIN }} "chmod 600 /tmp/deploy.env"
          rm /tmp/deploy.env
        shell: bash

      - name: Launch deploy on Pi
        run: |
          ssh ${{ secrets.CLOUDFLARE_TUNNEL_DOMAIN }} "
          rm -f /tmp/deploy.log /tmp/deploy.exit
          nohup bash -c 'source /tmp/deploy.env && ~/deployment-scripts/deploy-extras.sh > /tmp/deploy.log 2>&1; echo \$? > /tmp/deploy.exit; rm -f /tmp/deploy.env' > /dev/null 2>&1 &
          disown
          sleep 2
          echo 'Deploy launched'
          "
        shell: bash

      - name: Wait for deployment
        timeout-minutes: 30
        run: |
          HOST="${{ secrets.CLOUDFLARE_TUNNEL_DOMAIN }}"
          for i in $(seq 1 180); do
            result=$(ssh -o ConnectTimeout=10 "$HOST" \
              "[ -f /tmp/deploy.exit ] && echo done:\$(cat /tmp/deploy.exit) || echo running" 2>/dev/null || echo unreachable)
            echo "[$i/180] $result"
            case "$result" in
              done:0) echo "Deploy succeeded"; exit 0 ;;
              done:*)
                echo "Deploy failed — last 50 lines of log:"
                ssh "$HOST" "tail -50 /tmp/deploy.log" 2>/dev/null || true
                exit 1 ;;
            esac
            sleep 10
          done
          echo "Timed out after 30 minutes"
          exit 1
        shell: bash

      - name: Generate deployment summary
        run: |
          echo "## Extras Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Successfully deployed extras to Raspberry Pi" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed:** LiteLLM, Hermes, actual-http-api, Open WebUI, Vikunja" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** \`$(date -u)\`" >> $GITHUB_STEP_SUMMARY
