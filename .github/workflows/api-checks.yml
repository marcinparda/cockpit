name: API Checks

on:
  workflow_call:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
    paths:
      - 'cockpit-api/**'

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cockpit-api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --with dev

      - name: Enforce Mapped[] on all ORM columns
        run: |
          # Fail if any models.py uses bare Column() without a Mapped[] annotation
          # See docs/ARCHITECTURE.md — every column must use Mapped[T] = mapped_column(...)
          VIOLATIONS=$(grep -rn "= Column(" src --include="models.py" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: bare Column() found in models — use Mapped[T] = mapped_column() instead"
            echo "$VIOLATIONS"
            exit 1
          fi

      - name: Run tests with coverage
        run: poetry run pytest src/tests/ -v
