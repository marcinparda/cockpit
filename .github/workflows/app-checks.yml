name: App Checks

on:
  pull_request:
    branches: [master]
    paths:
      - 'cockpit-app/**'
  workflow_call:

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cockpit-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cockpit-app/package-lock.json

      - name: Validate exact package versions
        # Must run from repo root — find targets cockpit-app/ explicitly (job default is cockpit-app)
        working-directory: .
        run: |
          found=0
          while IFS= read -r pkg_file; do
            matches=$(grep -nE '": "[\^~><=*x]' "$pkg_file" 2>/dev/null || true)
            if [ -n "$matches" ]; then
              while IFS= read -r line; do
                specifier=$(echo "$line" | grep -oE '"[\^~><=*x][^"]*"' | head -1)
                if [ -n "$specifier" ]; then
                  echo "$pkg_file: $specifier"
                else
                  echo "$pkg_file: $line"
                fi
              done <<< "$matches"
              found=1
            fi
          done < <(find cockpit-app -name package.json \
            -not -path '*/node_modules/*' \
            -not -path '*/dist/*')
          if [ $found -eq 1 ]; then
            echo "Error: range specifiers found in package.json files. Use exact versions only."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Get last successful commit SHA from this workflow
        id: last_success
        run: |
          echo "Trying to find last successful SHA for workflow 'Deploy App' on branch ${{ github.ref_name }}"

          gh run list \
            --workflow="Deploy App" \
            --branch=${{ github.ref_name }} \
            --status=success \
            --json headSha \
            --limit 1 > result.json

          LAST_SUCCESSFUL_SHA=$(jq -r '.[0].headSha // empty' result.json)

          if [ -z "$LAST_SUCCESSFUL_SHA" ]; then
            echo "⚠️ No successful run found. Falling back to origin/master"
            git fetch origin master
            LAST_SUCCESSFUL_SHA=$(git rev-parse origin/master)
          fi

          echo "🔍 Last successful/known good SHA for affected check: $LAST_SUCCESSFUL_SHA"
          echo "LAST_SUCCESSFUL_SHA=$LAST_SUCCESSFUL_SHA" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run affected checks
        run: npx nx affected --targets=lint,build --base=$LAST_SUCCESSFUL_SHA --head=HEAD --parallel=8
      - name: Run affected tests with coverage
        run: npx nx affected --targets=test --base=$LAST_SUCCESSFUL_SHA --head=HEAD --parallel=8 -- --coverage
